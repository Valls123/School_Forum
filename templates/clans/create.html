{% extends 'base.html' %}
{% block content %}

<h1 class="text-3xl font-black mb-8">Создать клан</h1>

<div class="bg-[#151921] rounded-2xl border border-gray-800 p-6" style="max-width:560px;">
    <form method="POST" enctype="multipart/form-data" class="space-y-4">

        <div>
            <label class="block text-sm text-gray-400 mb-1">Название клана</label>
            <input name="name" required maxlength="50" placeholder="Название..."
                   class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Описание</label>
            <textarea name="description" maxlength="300" rows="3" placeholder="Расскажи о клане..."
                      class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm resize-none"></textarea>
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Режим вступления</label>
            <select name="mode" class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 text-sm">
                <option value="open">Открытый — вступить может любой</option>
                <option value="restricted">Ограниченный — по заявке или приглашению</option>
                <option value="closed">Закрытый — вступление невозможно</option>
            </select>
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Аватар клана</label>
            <input type="file" name="avatar" accept="image/*"
                   class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-xl text-sm">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Баннер клана</label>
            <input type="file" name="banner" accept="image/*"
                   class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-xl text-sm">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition">
                Создать
            </button>
            <a href="{{ url_for('clans.index') }}"
               class="border border-gray-700 hover:bg-white/5 text-gray-300 px-6 py-3 rounded-xl text-sm transition">
                Отмена
            </a>
        </div>
    </form>
</div>

{% endblock %}
