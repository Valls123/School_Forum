{% extends 'base.html' %}
{% block content %}
<div class="flex justify-center items-center mt-20">
    <div class="bg-[#151921] p-8 rounded-2xl border border-gray-800 w-full max-w-md shadow-2xl">
        <h2 class="text-3xl font-black text-center mb-6">Вход в систему</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm flex items-center gap-2
                    {% if category == 'error' %}bg-red-900/30 text-red-400 border border-red-800/40
                    {% elif category == 'success' %}bg-green-900/30 text-green-400 border border-green-800/40
                    {% else %}bg-blue-900/30 text-blue-400 border border-blue-800/40{% endif %}">
                    <i class="fas fa-exclamation-circle"></i>{{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Твой ник</label>
                <input name="username" required class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-lg focus:border-blue-500 outline-none mt-1 transition">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Пароль</label>
                <input name="password" type="password" required class="w-full bg-[#0b0e14] border border-gray-700 p-3 rounded-lg focus:border-blue-500 outline-none mt-1 transition text-white">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition transform active:scale-95">
                Войти
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Еще не с нами? <a href="/register" class="text-blue-400 hover:underline font-bold">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
